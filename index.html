<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LiberoLibro — mappa degli spazi indipendenti d'Italia</title>
<meta name="description" content="Mappa delle librerie indipendenti, degli spazi comunitari e degli eventi underground d'Italia.">
<style>
  :root {
    --nero: #111; --grigio: #666; --linea: #e2e2e2; --bg: #fff;
    --libreria: #e63946; --spazio: #2a9d8f; --evento: #e9a02a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: system-ui, -apple-system, sans-serif; color: var(--nero); }
  #app { display: flex; height: 100vh; }

  /* ---- Pannello sinistro ---- */
  #pannello { width: 380px; flex: 0 0 380px; border-right: 1px solid var(--linea); display: flex; flex-direction: column; }
  #testata { padding: 20px 24px 12px; }
  #testata h1 { margin: 0; font-size: 1.5rem; letter-spacing: -.02em; }
  #testata p { margin: 4px 0 0; font-size: .8rem; color: var(--grigio); }
  #contesto { padding: 0 24px 12px; font-size: .8rem; color: var(--grigio); min-height: 1.2em; }
  #contesto button { border: 0; background: none; padding: 0; font: inherit; color: var(--nero); text-decoration: underline; cursor: pointer; }

  #cerca { margin: 0 24px 12px; padding: 10px 12px; border: 1px solid var(--nero); border-radius: 8px; font-size: .9rem; }
  #filtri { display: flex; gap: 6px; padding: 0 24px 12px; flex-wrap: wrap; }
  .chip { border: 1px solid var(--linea); background: #fff; border-radius: 999px; padding: 5px 12px; font-size: .78rem; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
  .chip .pallino { width: 9px; height: 9px; border-radius: 50%; }
  .chip[aria-pressed="false"] { opacity: .4; }

  #lista { flex: 1; overflow-y: auto; border-top: 1px solid var(--linea); }
  .voce { padding: 12px 24px; border-bottom: 1px solid var(--linea); cursor: pointer; }
  .voce:hover, .voce[aria-selected="true"] { background: #f6f6f4; }
  .voce h3 { margin: 0; font-size: .95rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .voce h3 .pallino { width: 8px; height: 8px; border-radius: 50%; flex: 0 0 8px; }
  .voce p { margin: 2px 0 0; font-size: .78rem; color: var(--grigio); }
  #vuoto { padding: 24px; font-size: .85rem; color: var(--grigio); }

  #dettaglio { flex: 1; overflow-y: auto; border-top: 1px solid var(--linea); padding: 16px 24px 32px; }
  #dettaglio #torna { border: 0; background: none; padding: 0 0 12px; font: inherit; color: var(--grigio); cursor: pointer; }
  #dettaglio h2 { margin: 0; font-size: 1.25rem; letter-spacing: -.01em; }
  #dettaglio h4 { margin: 18px 0 4px; font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; color: var(--grigio); }
  #dettaglio p { margin: 4px 0; font-size: .88rem; line-height: 1.45; }
  #dettaglio .meta { color: var(--grigio); font-size: .8rem; }
  #dettaglio .hint { color: var(--grigio); font-style: italic; }
  .badges { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0; }
  .badge { font-size: .68rem; padding: 3px 8px; border-radius: 999px; border: 1px solid var(--linea); }
  .badge.ok { background: #eef7f4; border-color: #cfe9e1; color: #1c6b5c; }
  .badge.warn { background: #fdf0ef; border-color: #f5d6d3; color: #a3352c; }
  .links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; }
  .links a { font-size: .82rem; text-decoration: none; border: 1px solid var(--nero); border-radius: 8px; padding: 7px 12px; color: var(--nero); }
  .links a:hover { background: var(--nero); color: #fff; }

  /* ---- Mappa ---- */
  #mappa { flex: 1; position: relative; overflow: hidden; }
  #svg { width: 100%; height: 100%; display: block; }
  .regione { fill: #fff; stroke: var(--nero); stroke-width: 1; vector-effect: non-scaling-stroke; cursor: pointer; transition: fill .2s, opacity .6s; }
  .regione:hover { fill: #f2f2ef; }
  .regione.spenta { opacity: 0; pointer-events: none; }
  .regione.attiva { fill: #fff; cursor: default; }
  .dot { stroke: #fff; stroke-width: 1.5; vector-effect: non-scaling-stroke; cursor: pointer; transition: opacity .4s; }
  .dot.selezionato { stroke: var(--nero); stroke-width: 2; }
  #foto image { opacity: 0; transition: opacity .6s; }
</style>
</head>
<body>
<div id="app">
  <aside id="pannello">
    <div id="testata">
      <h1>LiberoLibro</h1>
      <p>Librerie indipendenti, spazi comunitari ed eventi underground d'Italia.</p>
      <a href="blog.html" style="font-size:.82rem;color:var(--nero)">Consigli di lettura →</a>
      <a href="progetto.html" style="font-size:.82rem;color:var(--grigio);margin-left:12px">Il progetto</a>
    </div>
    <div id="contesto"></div>
    <input id="cerca" type="search" placeholder="Cerca per nome o città…" autocomplete="off">
    <div id="filtri"></div>
    <div id="dettaglio" hidden></div>
    <div id="lista"></div>
  </aside>
  <div id="mappa">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
      <defs><clipPath id="clip"><path id="clipPath" d=""/></clipPath></defs>
      <g id="regioni"></g>
      <g id="foto" clip-path="url(#clip)">
        <image id="fotoA" preserveAspectRatio="xMidYMid slice"/>
        <image id="fotoB" preserveAspectRatio="xMidYMid slice"/>
      </g>
      <g id="dots"></g>
    </svg>
  </div>
</div>

<script>
const CAT = {
  libreria: { etichetta: 'Librerie' },
  spazio:   { etichetta: 'Spazi' },
  evento:   { etichetta: 'Eventi' },
  lettura:  { etichetta: 'Dove leggere' },
};
const COLORE = { libreria: '#e63946', spazio: '#2a9d8f', evento: '#e9a02a', lettura: '#3f7cad' };
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const nomeBreve = n => n.split('/')[0].trim();
// ponytail: foto placeholder da picsum finché non arrivano quelle reali (Street View / Google Maps API).
const fotoDi = l => l.foto || `https://picsum.photos/seed/${encodeURIComponent(l.osm_id || l.nome)}/900/700`;

// ---- Proiezione mercatore, adattata al bbox delle regioni ----
const W = 1000;
let scala, offX, offY, H;
const merc = ([lon, lat]) => [lon, Math.log(Math.tan(Math.PI / 4 + lat * Math.PI / 360)) * 180 / Math.PI];
let pt = () => [0, 0]; // definita dopo aver calcolato i bounds

// ---- Stato ----
let regioni = [], luoghi = [];
let attiva = null, selezionato = null;
const filtri = new Set(Object.keys(CAT));
let soloIndip = false;
let mostraRiservati = false;
let query = '';
const $ = id => document.getElementById(id);
const svg = $('svg');

// ---- Point-in-polygon (ray casting) su coordinate lon/lat ----
function inRing(p, ring) {
  let dentro = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const [xi, yi] = ring[i], [xj, yj] = ring[j];
    if ((yi > p[1]) !== (yj > p[1]) && p[0] < ((xj - xi) * (p[1] - yi)) / (yj - yi) + xi) dentro = !dentro;
  }
  return dentro;
}
function poligoniDi(geom) { // -> array di anelli esterni
  return geom.type === 'Polygon' ? [geom.coordinates[0]] : geom.coordinates.map(p => p[0]);
}

// ---- Costruzione path SVG da geometria ----
function pathDi(geom) {
  const polys = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;
  let d = '';
  for (const poly of polys) for (const ring of poly) {
    d += ring.map((c, i) => (i ? 'L' : 'M') + pt(c).map(n => n.toFixed(1)).join(' ')).join('') + 'Z';
  }
  return d;
}
function bboxDi(geom) {
  let b = [Infinity, Infinity, -Infinity, -Infinity];
  const polys = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;
  for (const poly of polys) for (const ring of poly) for (const c of ring) {
    const [x, y] = pt(c);
    b[0] = Math.min(b[0], x); b[1] = Math.min(b[1], y); b[2] = Math.max(b[2], x); b[3] = Math.max(b[3], y);
  }
  return b;
}

// ---- Zoom: tween del viewBox ----
let vb = [0, 0, W, 0];
let raf = null;
function setVB(v) {
  vb = v; svg.setAttribute('viewBox', v.join(' '));
  const r = Math.max(v[2] * 0.006, 1.2); // raggio dot costante sullo schermo
  for (const c of $('dots').children) c.setAttribute('r', c.classList.contains('selezionato') ? r * 1.7 : r);
}
function zoomA(target, dur = 700) {
  const start = vb.slice(), t0 = performance.now();
  cancelAnimationFrame(raf);
  const step = now => {
    const k = Math.min(1, (now - t0) / dur), e = 1 - Math.pow(1 - k, 3); // easeOutCubic
    setVB(start.map((s, i) => s + (target[i] - s) * e));
    if (k < 1) raf = requestAnimationFrame(step);
  };
  raf = requestAnimationFrame(step);
}
const bboxConMargine = (b, m = 0.15) => {
  const w = b[2] - b[0], h = b[3] - b[1], lato = Math.max(w, h) * (1 + m * 2);
  const cx = (b[0] + b[2]) / 2, cy = (b[1] + b[3]) / 2;
  return [cx - lato / 2, cy - lato / 2, lato, lato];
};

// ---- Render ----
function coloreCat(c) { return COLORE[c] || '#111'; }

function renderRegioni() {
  $('regioni').innerHTML = regioni.map(r =>
    `<path class="regione" data-nome="${esc(r.nome)}" d="${r.d}"><title>${esc(nomeBreve(r.nome))}</title></path>`
  ).join('');
  $('regioni').querySelectorAll('.regione').forEach(p =>
    p.addEventListener('click', () => selezionaRegione(p.dataset.nome)));
}

function luoghiVisibili() {
  return luoghi.filter(l =>
    filtri.has(l.categoria) &&
    (!soloIndip || l.indip !== false) &&
    (mostraRiservati || !l.riservato) &&
    (!attiva || l.regione === attiva) &&
    (nomeBreve(l.nome) + ' ' + (l.citta || '')).toLowerCase().includes(query));
}

function renderDots() {
  const vis = luoghiVisibili();
  $('dots').innerHTML = vis.map(l =>
    `<circle class="dot" data-id="${esc(l.id)}" cx="${l.xy[0].toFixed(1)}" cy="${l.xy[1].toFixed(1)}" fill="${coloreCat(l.categoria)}"/>`
  ).join('');
  $('dots').querySelectorAll('.dot').forEach(c =>
    c.addEventListener('click', () => selezionaLuogo(c.dataset.id)));
  setVB(vb); // ricalcola i raggi
}

function renderLista() {
  const vis = luoghiVisibili().sort((a, b) => nomeBreve(a.nome).localeCompare(nomeBreve(b.nome)));
  const lista = $('lista');
  if (!vis.length) { lista.innerHTML = '<div id="vuoto">Nessun risultato.</div>'; return; }
  lista.innerHTML = vis.map(l => `
    <div class="voce" data-id="${esc(l.id)}" aria-selected="${l.id === selezionato}">
      <h3><span class="pallino" style="background:${coloreCat(l.categoria)}"></span>${esc(nomeBreve(l.nome))}</h3>
      <p>${esc(l.citta || '')}${l.indirizzo ? ' · ' + esc(l.indirizzo) : ''}</p>
    </div>`).join('');
  lista.querySelectorAll('.voce').forEach(v =>
    v.addEventListener('click', () => selezionaLuogo(v.dataset.id)));
}

function mostraLista() { $('dettaglio').hidden = true; $('lista').hidden = false; }

function mostraDettaglio(l) {
  const spec = Array.isArray(l.specialita) ? l.specialita.join(', ') : l.specialita;
  const badges = [
    l.categoria === 'libreria' && (l.indip === false
      ? '<span class="badge warn">Omonimi in più città — da verificare</span>'
      : '<span class="badge ok">Indipendente</span>'),
    l.universitaria && '<span class="badge">Universitaria</span>',
    l.usato && '<span class="badge">Usato</span>',
    l.categoria === 'lettura' && `<span class="badge">Dove leggere${l.tipo ? ' · ' + esc(l.tipo) : ''}</span>`,
    l.riservato && '<span class="badge warn">Riservato — teniamolo per noi</span>',
  ].filter(Boolean).join('');
  $('dettaglio').innerHTML = `
    <button id="torna">← Lista</button>
    <h2>${esc(nomeBreve(l.nome))}</h2>
    <div class="badges">${badges}</div>
    <p class="meta">${esc(l.citta || '')}${l.indirizzo ? ' · ' + esc(l.indirizzo) : ''}</p>
    <p>${esc(l.descrizione || '')}</p>
    ${spec ? `<h4>Specialità</h4><p>${esc(spec)}</p>`
           : '<p class="hint">Specialità non ancora indicate — scrivi al luogo per contribuire.</p>'}
    ${l.consiglio ? `<h4>Il consiglio del libraio</h4><p>${esc(l.consiglio)}</p>` : ''}
    <div class="links">
      ${l.sito ? `<a href="${esc(l.sito)}" target="_blank" rel="noopener">Sito</a>` : ''}
      ${l.abebooks ? `<a href="${esc(l.abebooks)}" target="_blank" rel="noopener">Catalogo su AbeBooks</a>` : ''}
      ${l.email ? `<a href="mailto:${esc(l.email)}">Scrivi</a>` : ''}
    </div>`;
  $('dettaglio').hidden = false; $('lista').hidden = true;
  $('torna').addEventListener('click', deseleziona);
}

function deseleziona() {
  selezionato = null;
  mostraLista(); nascondiFoto();
  document.querySelectorAll('.dot').forEach(d => d.classList.remove('selezionato'));
}

function renderContesto() {
  $('contesto').innerHTML = attiva
    ? `<button id="reset">← Tutta Italia</button> · ${esc(nomeBreve(attiva))}`
    : 'Clicca una regione per esplorarla.';
  const r = $('reset'); if (r) r.addEventListener('click', resetVista);
}

function renderFiltri() {
  const chips = Object.entries(CAT).map(([k, v]) =>
    `<button class="chip" data-cat="${k}" aria-pressed="true"><span class="pallino" style="background:${COLORE[k]}"></span>${v.etichetta}</button>`
  ).join('');
  $('filtri').innerHTML = chips +
    `<button class="chip" id="soloIndip" aria-pressed="false">Solo indipendenti</button>` +
    `<button class="chip" id="mostraRiservati" aria-pressed="false" title="Posti da tenere per noi, nascosti di default">Riservati</button>`;
  $('filtri').querySelectorAll('.chip[data-cat]').forEach(c => c.addEventListener('click', () => {
    const k = c.dataset.cat;
    filtri.has(k) ? filtri.delete(k) : filtri.add(k);
    c.setAttribute('aria-pressed', filtri.has(k));
    renderDots(); renderLista();
  }));
  $('soloIndip').addEventListener('click', () => {
    soloIndip = !soloIndip;
    $('soloIndip').setAttribute('aria-pressed', soloIndip);
    renderDots(); renderLista();
  });
  $('mostraRiservati').addEventListener('click', () => {
    mostraRiservati = !mostraRiservati;
    $('mostraRiservati').setAttribute('aria-pressed', mostraRiservati);
    renderDots(); renderLista();
  });
}

// ---- Interazioni ----
function selezionaRegione(nome) {
  attiva = nome; selezionato = null;
  const reg = regioni.find(r => r.nome === nome);
  regioni.forEach(r => $('regioni').querySelector(`[data-nome="${CSS.escape(r.nome)}"]`)
    .classList.toggle('spenta', r.nome !== nome));
  $('regioni').querySelector(`[data-nome="${CSS.escape(nome)}"]`).classList.add('attiva');
  nascondiFoto();
  zoomA(bboxConMargine(reg.bbox));
  renderContesto(); renderDots(); renderLista(); mostraLista();
}

function resetVista() {
  attiva = null; selezionato = null;
  $('regioni').querySelectorAll('.regione').forEach(p => p.classList.remove('spenta', 'attiva'));
  nascondiFoto();
  zoomA([0, 0, W, H]);
  renderContesto(); renderDots(); renderLista(); mostraLista();
}

let fotoAttiva = 'A';
function mostraFoto(l, reg) {
  $('clipPath').setAttribute('d', reg.d);
  const [x, y, x2, y2] = reg.bbox;
  const succ = fotoAttiva === 'A' ? 'B' : 'A';
  const img = $('foto' + succ), img0 = $('foto' + fotoAttiva);
  img.setAttribute('x', x); img.setAttribute('y', y);
  img.setAttribute('width', x2 - x); img.setAttribute('height', y2 - y);
  img.setAttributeNS('http://www.w3.org/1999/xlink', 'href', fotoDi(l));
  img.setAttribute('href', fotoDi(l));
  img.style.opacity = 1; img0.style.opacity = 0;
  fotoAttiva = succ;
}
function nascondiFoto() { $('fotoA').style.opacity = 0; $('fotoB').style.opacity = 0; }

function selezionaLuogo(id) {
  const l = luoghi.find(x => x.id === id);
  if (!l) return;
  selezionato = id;
  if (l.regione && l.regione !== attiva) { selezionaRegione(l.regione); selezionato = id; }
  const reg = regioni.find(r => r.nome === l.regione);
  if (reg) mostraFoto(l, reg);
  renderDots();
  document.querySelectorAll('.dot').forEach(d => d.classList.toggle('selezionato', d.dataset.id === id));
  setVB(vb);
  mostraDettaglio(l);
}

// ---- Avvio ----
Promise.all([
  fetch('regioni.geojson').then(r => r.json()),
  fetch('luoghi.json', { cache: 'no-store' }).then(r => r.json()),
]).then(([geo, dati]) => {
  // bounds proiettati
  let b = [Infinity, Infinity, -Infinity, -Infinity];
  const tocca = c => { const m = merc(c); b[0]=Math.min(b[0],m[0]); b[1]=Math.min(b[1],m[1]); b[2]=Math.max(b[2],m[0]); b[3]=Math.max(b[3],m[1]); };
  geo.features.forEach(f => (f.geometry.type === 'Polygon' ? [f.geometry.coordinates] : f.geometry.coordinates)
    .forEach(poly => poly.forEach(ring => ring.forEach(tocca))));
  scala = W / (b[2] - b[0]); H = (b[3] - b[1]) * scala; offX = b[0]; offY = b[3];
  pt = c => { const m = merc(c); return [(m[0] - offX) * scala, (offY - m[1]) * scala]; };
  vb = [0, 0, W, H]; setVB(vb);

  regioni = geo.features.map(f => ({ nome: f.properties.nome, geom: f.geometry, d: pathDi(f.geometry), bbox: bboxDi(f.geometry) }));

  // assegna ogni luogo alla regione (point-in-polygon)
  luoghi = dati.map((l, i) => {
    const reg = regioni.find(r => poligoniDi(r.geom).some(ring => inRing([l.lon, l.lat], ring)));
    return { ...l, id: l.osm_id || 'x' + i, xy: pt([l.lon, l.lat]), regione: reg ? reg.nome : null };
  });

  renderRegioni(); renderFiltri(); renderContesto(); renderDots(); renderLista();
});

$('cerca').addEventListener('input', e => { query = e.target.value.toLowerCase().trim(); renderDots(); renderLista(); });
</script>
</body>
</html>
